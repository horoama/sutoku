version: '3.8'

services:
  backend:
    image: registry.gate.home/sutoku-backend
    build:
      context: ./backend
      args:
        - http_proxy=${HTTP_PROXY:-}
        - https_proxy=${HTTPS_PROXY:-}
        - no_proxy=${NO_PROXY:-}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    volumes:
      - ./backend/data:/app/data

  frontend:
    image: registry.gate.home/sutoku-frontend
    build:
      context: ./frontend
      args:
        - http_proxy=${HTTP_PROXY:-}
        - https_proxy=${HTTPS_PROXY:-}
        - no_proxy=${NO_PROXY:-}
    ports:
      - "8081:8081"
      - "19000-19002:19000-19002"
    environment:
      - EXPO_WEB_PORT=8081
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - EXPO_PACKAGER_HOSTNAME=${EXPO_PACKAGER_HOSTNAME:-192.168.11.116}
      - REACT_NATIVE_PACKAGER_HOSTNAME=${REACT_NATIVE_PACKAGER_HOSTNAME:-192.168.11.116}
      - EXPO_DEBUG=true
      - CI=1
    volumes:
      - ./frontend/src:/app/src
    command: npx expo start --lan
    stdin_open: true
    tty: true
    depends_on:
      - backend
